document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

mail<\u002Flabel>\n              <input class=\"field\" type=\"email\" placeholder=\"you@email.com\" value=\"{{ email }}\" onchange=\"{{ onEmailChange }}\" style=\"width:100%;border:1.5px solid rgba(0,0,0,.1);border-radius:8px;padding:11px 14px;font-family:'Work Sans',sans-serif;font-size:14px;color:#1a2e1f;outline:none;transition:border-color .2s;\">\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:12px;\">\n            <div>\n              <label style=\"font-family:'Work Sans',sans-serif;font-size:11px;font-weight:700;color:#9ab0a0;text-transform:uppercase;letter-spacing:.08em;display:block;margin-bottom:6px;\">Travel date<\u002Flabel>\n              <input class=\"field\" type=\"date\" value=\"{{ date }}\" onchange=\"{{ onDateChange }}\" style=\"width:100%;border:1.5px solid rgba(0,0,0,.1);border-radius:8px;padding:11px 14px;font-family:'Work Sans',sans-serif;font-size:14px;color:#1a2e1f;outline:none;transition:border-color .2s;\">\n            <\u002Fdiv>\n            <div>\n              <label style=\"font-family:'Work Sans',sans-serif;font-size:11px;font-weight:700;color:#9ab0a0;text-transform:uppercase;letter-spacing:.08em;display:block;margin-bottom:6px;\">Interested in<\u002Flabel>\n              <select class=\"field\" onchange=\"{{ onInterestChange }}\" style=\"width:100%;border:1.5px solid rgba(0,0,0,.1);border-radius:8px;padding:11px 14px;font-family:'Work Sans',sans-serif;font-size:14px;color:#1a2e1f;outline:none;transition:border-color .2s;appearance:none;cursor:pointer;background:#fff;\">\n                <option value=\"tours\">Tours<\u002Foption>\n                <option value=\"cars\">Car Rental<\u002Foption>\n                <option value=\"both\">Tours &amp; Car<\u002Foption>\n              <\u002Fselect>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div>\n            <label style=\"font-family:'Work Sans',sans-serif;font-size:11px;font-weight:700;color:#9ab0a0;text-transform:uppercase;letter-spacing:.08em;display:block;margin-bottom:6px;\">Message<\u002Flabel>\n            <textarea class=\"field\" rows=\"3\" placeholder=\"Tell us about your trip…\" value=\"{{ message }}\" onchange=\"{{ onMessageChange }}\" style=\"width:100%;border:1.5px solid rgba(0,0,0,.1);border-radius:8px;padding:11px 14px;font-family:'Work Sans',sans-serif;font-size:14px;color:#1a2e1f;outline:none;transition:border-color .2s;resize:vertical;\"><\u002Ftextarea>\n          <\u002Fdiv>\n          <sc-if value=\"{{ error }}\" hint-placeholder-val=\"{{ false }}\">\n            <p style=\"font-family:'Work Sans',sans-serif;font-size:13px;color:#e05050;\">{{ error }}<\u002Fp>\n          <\u002Fsc-if>\n          <button type=\"submit\" class=\"btn-green\" style=\"padding:14px;font-size:15px;border-radius:8px;border:none;cursor:pointer;width:100%;\">Send Inquiry →<\u002Fbutton>\n        <\u002Fform>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ABOUT -->\n<section id=\"about\" style=\"background:#fff;padding:88px 64px;\">\n  <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:72px;align-items:center;\">\n    <div style=\"height:360px;background:repeating-linear-gradient(135deg,#1a4828 0,#1a4828 14px,#286a3a 14px,#286a3a 28px);border-radius:18px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;\">\n      <span style=\"font-family:monospace;font-size:10px;color:rgba(255,255,255,.28);background:rgba(0,0,0,.35);padding:6px 12px;border-radius:6px;line-height:1.6;text-align:center;\">Photo: Local guides<br>in the field<\u002Fspan>\n    <\u002Fdiv>\n    <div>\n      <p style=\"font-family:'Work Sans',sans-serif;font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#4caf7d;margin-bottom:14px;\">Our Story<\u002Fp>\n      <h2 style=\"font-family:'Syne',sans-serif;font-size:42px;font-weight:800;color:#1a2e1f;letter-spacing:-.02em;margin-bottom:20px;line-height:1.05;\">Born from a love<br>of Pura Vida<\u002Fh2>\n      <p style=\"font-family:'Work Sans',sans-serif;font-size:15px;color:#6a7e72;line-height:1.78;margin-bottom:16px;\">Costa Rica Hub was founded by local guides with deep roots in the land — from the misty heights of Chirripó to the sun-drenched Nicoya Peninsula.<\u002Fp>\n      <p style=\"font-family:'Work Sans',sans-serif;font-size:15px;color:#6a7e72;line-height:1.78;margin-bottom:32px;\">We combine certified expertise with a handpicked vehicle fleet so every visitor can explore safely, authentically, and unforgettably.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- FAQ -->\n<section style=\"background:#f5f0e8;padding:88px 64px;\">\n  <div style=\"max-width:760px;margin:0 auto;\">\n    <p style=\"font-family:'Work Sans',sans-serif;font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#4caf7d;margin-bottom:14px;text-align:center;\">Need help?<\u002Fp>\n    <h2 style=\"font-family:'Syne',sans-serif;font-size:46px;font-weight:800;color:#1a2e1f;text-align:center;letter-spacing:-.02em;margin-bottom:52px;\">Common Questions<\u002Fh2>\n    <div style=\"display:flex;flex-direction:column;gap:12px;\">\n      <details style=\"background:#fff;border-radius:14px;padding:4px 26px;box-shadow:0 1px 4px rgba(0,0,0,.05);\">\n        <summary class=\"faq-summary\" style=\"font-family:'Syne',sans-serif;font-size:17px;font-weight:700;color:#1a2e1f;padding:20px 0;\">What's included in the tours? <span class=\"faq-icon\"><\u002Fspan><\u002Fsummary>\n        <div class=\"faq-body\">All tours include an English-speaking certified guide, round-trip transport from San José, national park entrance fees, and a traditional Costa Rican lunch. Overnight tours note accommodation in their description.<\u002Fdiv>\n      <\u002Fdetails>\n      <details style=\"background:#fff;border-radius:14px;padding:4px 26px;box-shadow:0 1px 4px rgba(0,0,0,.05);\">\n        <summary class=\"faq-summary\" style=\"font-family:'Syne',sans-serif;font-size:17px;font-weight:700;color:#1a2e1f;padding:20px 0;\">What do I need to rent a car? <span class=\"faq-icon\"><\u002Fspan><\u002Fsummary>\n        <div class=\"faq-body\">A valid driver's license from your home country, a major credit card for the deposit, and your passport. No International Driving Permit is needed. Minimum rental age is 21.<\u002Fdiv>\n      <\u002Fdetails>\n      <details style=\"background:#fff;border-radius:14px;padding:4px 26px;box-shadow:0 1px 4px rgba(0,0,0,.05);\">\n        <summary class=\"faq-summary\" style=\"font-family:'Syne',sans-serif;font-size:17px;font-weight:700;color:#1a2e1f;padding:20px 0;\">Can I book last minute? <span class=\"faq-icon\"><\u002Fspan><\u002Fsummary>\n        <div class=\"faq-body\">We recommend 48–72 hours advance booking, especially December–April peak season. For same-day requests, reach us directly on WhatsApp for the fastest response.<\u002Fdiv>\n      <\u002Fdetails>\n      <details style=\"background:#fff;border-radius:14px;padding:4px 26px;box-shadow:0 1px 4px rgba(0,0,0,.05);\">\n        <summary class=\"faq-summary\" style=\"font-family:'Syne',sans-serif;font-size:17px;font-weight:700;color:#1a2e1f;padding:20px 0;\">What is your cancellation policy? <span class=\"faq-icon\"><\u002Fspan><\u002Fsummary>\n        <div class=\"faq-body\">Tours cancelled 72+ hours prior receive a full refund; 24–72 hours, 50% refund. Car rentals can be cancelled for a full refund 48 hours before pickup. No-shows are non-refundable.<\u002Fdiv>\n      <\u002Fdetails>\n      <details style=\"background:#fff;border-radius:14px;padding:4px 26px;box-shadow:0 1px 4px rgba(0,0,0,.05);\">\n        <summary class=\"faq-summary\" style=\"font-family:'Syne',sans-serif;font-size:17px;font-weight:700;color:#1a2e1f;padding:20px 0;\">Do you offer airport pickup? <span class=\"faq-icon\"><\u002Fspan><\u002Fsummary>\n        <div class=\"faq-body\">Yes — we offer pickup from Juan Santamaría International Airport (SJO) and Daniel Oduber Airport (LIR). Mention it in your inquiry and we'll include it in your itinerary quote.<\u002Fdiv>\n      <\u002Fdetails>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- FOOTER -->\n<footer style=\"background:#1a2e1f;padding:64px 64px 28px;\">\n  <div style=\"display:grid;grid-template-columns:2fr 1fr 1fr;gap:56px;margin-bottom:44px;\">\n    <div>\n      <div style=\"font-family:'Syne',sans-serif;font-size:26px;font-weight:800;color:#fff;margin-bottom:16px;\">Costa Rica<span style=\"color:#4caf7d;\">Hub<\u002Fspan><\u002Fdiv>\n      <p style=\"font-family:'Work Sans',sans-serif;font-size:14px;color:rgba(255,255,255,.4);line-height:1.75;max-width:280px;\">Your trusted local partner for unforgettable tours and car rentals across Costa Rica.<\u002Fp>\n    <\u002Fdiv>\n    <div>\n      <p style=\"font-family:'Work Sans',sans-serif;font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.3);margin-bottom:16px;\">Explore<\u002Fp>\n      <div style=\"display:flex;flex-direction:column;gap:10px;\">\n        <a href=\"#tours\" class=\"nav-link\" style=\"color:rgba(255,255,255,.5);\">Tours<\u002Fa>\n        <a href=\"#cars\" class=\"nav-link\" style=\"color:rgba(255,255,255,.5);\">Car Rental<\u002Fa>\n        <a href=\"#about\" class=\"nav-link\" style=\"color:rgba(255,255,255,.5);\">About Us<\u002Fa>\n        <a href=\"#book\" class=\"nav-link\" style=\"color:rgba(255,255,255,.5);\">Contact<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div>\n      <p style=\"font-family:'Work Sans',sans-serif;font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.3);margin-bottom:16px;\">Contact<\u002Fp>\n      <div style=\"display:flex;flex-direction:column;gap:10px;\">\n        <p style=\"font-family:'Work Sans',sans-serif;font-size:14px;color:rgba(255,255,255,.5);\">San José, Costa Rica<\u002Fp>\n        <p style=\"font-family:'Work Sans',sans-serif;font-size:14px;color:rgba(255,255,255,.5);\">+506 2234-5678<\u002Fp>\n        <p style=\"font-family:'Work Sans',sans-serif;font-size:14px;color:rgba(255,255,255,.5);\">hello@costaricahub.com<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"border-top:1px solid rgba(255,255,255,.08);padding-top:22px;display:flex;justify-content:space-between;\">\n    <p style=\"font-family:'Work Sans',sans-serif;font-size:12px;color:rgba(255,255,255,.2);\">© 2026 Costa Rica Hub. All rights reserved.<\u002Fp>\n    <p style=\"font-family:'Work Sans',sans-serif;font-size:12px;color:rgba(255,255,255,.2);\">Pura Vida ♥<\u002Fp>\n  <\u002Fdiv>\n<\u002Ffooter>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = {\n    form: { name: '', email: '', date: '', interest: 'tours', message: '' },\n    submitted: false,\n    error: '',\n  };\n\n  handleSubmit(e) {\n    e.preventDefault();\n    const { name, email, date } = this.state.form;\n    if (!name.trim() || !email.trim() || !date) {\n      this.setState({ error: 'Please fill in your name, email, and travel date.' });\n      return;\n    }\n    this.setState({ submitted: true, error: '' });\n  }\n\n  setField(field) {\n    return (e) => this.setState(s => ({ form: { ...s.form, [field]: e.target.value } }));\n  }\n\n  renderVals() {\n    const { form, submitted, error } = this.state;\n    return {\n      name: form.name,\n      email: form.email,\n      date: form.date,\n      message: form.message,\n      submitted,\n      notSubmitted: !submitted,\n      error,\n      onSubmit: e => this.handleSubmit(e),\n      onNameChange: this.setField('name'),\n      onEmailChange: this.setField('email'),\n      onDateChange: this.setField('date'),\n      onInterestChange: this.setField('interest'),\n      onMessageChange: this.setField('message'),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
</body>
